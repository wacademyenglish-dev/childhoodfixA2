<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS | Childhood Memories (A2)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- SPOTIFY INSPIRED THEME --- */
        :root {
            --bg: #121212;
            --surface: #181818;
            --surface-hover: #282828;
            --border: transparent;
            --accent: #1DB954;
            --accent-glow: rgba(29, 185, 84, 0.3);
            --correct: #1DB954;
            --incorrect: #E91429;
            --text-main: #FFFFFF;
            --text-dim: #B3B3B3;
            --font: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- UI COMPONENTS --- */
        .glass-panel {
            background: var(--surface);
            border-radius: 12px;
            padding: 30px;
            transition: background 0.3s;
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo { font-weight: 800; letter-spacing: 2px; font-size: 14px; display: flex; align-items: center; gap: 10px; color: #fff;}
        .logo span { color: var(--accent); }

        .progress-container { position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: #282828; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent-glow); }

        .controls { display: flex; gap: 15px; }
        .icon-btn { background: transparent; border: none; color: var(--text-dim); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .icon-btn:hover { background: var(--surface-hover); color: #fff; transform: scale(1.05); }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1; margin-top: 70px; margin-bottom: 90px; position: relative;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            overflow-y: auto;
        }

        .step {
            position: absolute; width: 100%; max-width: 850px;
            opacity: 0; pointer-events: none; transform: scale(0.98);
            transition: all 0.4s ease-out; visibility: hidden;
            max-height: 75vh; overflow-y: auto; padding: 40px;
            scrollbar-width: thin; scrollbar-color: #535353 var(--bg);
        }

        .step::-webkit-scrollbar { width: 8px; }
        .step::-webkit-scrollbar-thumb { background: #535353; border-radius: 4px; }

        .step.active {
            opacity: 1; pointer-events: auto; transform: scale(1);
            visibility: visible; position: relative;
        }

        /* --- TYPOGRAPHY & BUTTONS --- */
        h1 { font-size: 3rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
        h2 { font-size: 1.8rem; margin-bottom: 20px; color: #fff; font-weight: 700; letter-spacing: -0.5px;}
        h3 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 700;}
        p { margin-bottom: 20px; color: var(--text-dim); font-size: 1.1rem; }

        .btn {
            padding: 16px 36px; border: none; border-radius: 500px; font-family: var(--font);
            font-size: 1rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
            background: #fff; color: #000;
        }
        .btn-accent { background: var(--accent); color: #000; }
        .btn:hover { transform: scale(1.04); }
        .btn-accent:hover { background: #1ed760; filter: brightness(1.1); }
        .btn:disabled { opacity: 0.3; pointer-events: none; }

        /* --- PREMIUM SPEAKING HUB --- */
        .speaking-hub {
            margin-top: 35px; padding: 30px;
            background: #181818; border-radius: 12px;
            border: 1px solid #282828;
            position: relative; display: none;
            animation: slideUp 0.4s ease forwards;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .speaking-hub::before {
            content: 'SPEAKING HUB';
            position: absolute; top: -12px; left: 24px;
            background: var(--accent); color: #000;
            font-size: 0.75rem; font-weight: 800;
            padding: 4px 12px; border-radius: 500px;
            letter-spacing: 1px;
        }
        .speaking-hub p { margin: 0; color: #fff; font-weight: 600; font-size: 1.15rem; line-height: 1.5; }

        /* --- BOTTOM NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: #181818; border-top: 1px solid #282828;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 90;
        }

        /* --- MODULE STYLES --- */
        .slider-group { margin-bottom: 30px; }
        .slider-group label { display: block; margin-bottom: 12px; font-weight: 600; color: #fff;}
        input[type=range] { -webkit-appearance: none; width: 100%; background: #535353; height: 4px; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; transition: 0.2s;}
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .choice-card { padding: 30px; text-align: center; cursor: pointer; background: var(--surface); border-radius: 8px; transition: all 0.2s; border: 2px solid transparent; }
        .choice-card:hover { background: var(--surface-hover); }
        
        .list-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .list-item { padding: 18px 24px; background: var(--surface); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; transition: background 0.2s;}
        .list-item:hover { background: var(--surface-hover); }

        .vocab-word { color: var(--accent); font-weight: 800; cursor: pointer; transition: all 0.2s; display: inline-block;}
        .vocab-word:hover { color: #1ed760; text-decoration: underline; }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 15px; background: var(--surface); border-radius: 8px; font-weight: 600;}
        .toggle-btn { background: #282828; border: none; color: var(--text-main); padding: 10px 24px; border-radius: 500px; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .toggle-btn:hover { background: #3E3E3E; }
        .toggle-btn.correct { background: var(--correct); color: #000; }
        .toggle-btn.incorrect { background: var(--incorrect); color: #fff; }

        .drop-zone { min-height: 80px; border: 2px dashed #535353; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; padding: 15px; gap: 10px; flex-wrap: wrap; }
        .drop-zone.success { border-color: var(--correct); border-style: solid; background: rgba(29, 185, 84, 0.05); }
        .word-bank { display: flex; gap: 10px; flex-wrap: wrap; }
        .word-chip { padding: 12px 24px; background: var(--surface); border-radius: 500px; cursor: pointer; user-select: none; transition: all 0.2s; font-weight: 600;}
        .word-chip:hover { background: #3E3E3E; }
        .word-chip.used { opacity: 0; pointer-events: none; }

        .chat-container { display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 16px 20px; border-radius: 16px; max-width: 80%; font-size: 1.1rem; }
        .msg.friend { background: #282828; align-self: flex-start; border-bottom-left-radius: 4px; color: #fff; }
        .msg.you { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; display: none; font-weight: 600;}
        .chat-option { padding: 16px 20px; background: var(--surface); border-radius: 8px; cursor: pointer; text-align: left; color: #fff; font-weight: 600;}
        .chat-option:hover { background: var(--surface-hover); }

        .arena-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;}
        .arena-card { width: 220px; height: 300px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .arena-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; border-radius: 12px; }
        .card-front { background: var(--surface); font-size: 3rem; color: #fff; }
        .card-back { background: var(--accent); transform: rotateY(180deg); color: #000; overflow-y: auto;}
        .card-back h3 { color: #000; font-weight: 800; }
        .card-back p { color: #121212; font-weight: 600; }

        /* Error Finder */
        .error-sentence { font-size: 1.5rem; word-spacing: 5px; line-height: 2; font-weight: 600;}
        .error-word { display: inline-block; padding: 5px 10px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .error-word:hover { background: #282828; }
        .error-word.found { background: var(--incorrect); color: white; }

        /* Memory Minigame */
        .memory-box { display: flex; gap: 15px; justify-content: center; margin: 30px 0; font-size: 2rem; font-weight: 800; color: #fff; letter-spacing: 3px;}
        .memory-btn { width: auto; padding: 15px 25px; border-radius: 8px; background: #282828; border: none; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s;}
        .memory-btn:hover { background: #3E3E3E; transform: scale(1.05); }

        /* --- SPOTIFY STYLE VOCAB PANEL --- */
        .vocab-panel {
            position: fixed; top: 0; right: -450px; width: 400px; height: 100vh;
            background: #121212; border-left: 1px solid #282828;
            z-index: 200; padding: 40px 30px; box-shadow: -10px 0 40px rgba(0,0,0,0.8);
            transition: right 0.4s cubic-bezier(0.3, 0, 0, 1);
            display: flex; flex-direction: column; gap: 24px;
        }
        .vocab-panel.open { right: 0; }
        
        .vocab-close {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.05); border: none; color: #B3B3B3;
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.2s;
        }
        .vocab-close:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.05); }
        
        .vocab-eyebrow { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; }
        .vocab-title { font-size: 3.2rem; font-weight: 800; line-height: 1.1; margin-bottom: 10px; color: #fff; text-transform: uppercase; letter-spacing: -1px;}
        
        .vocab-card { background: #181818; border-radius: 8px; padding: 25px; transition: background 0.2s; }
        .vocab-card:hover { background: #282828; }
        .vocab-card-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 12px; }
        .vocab-def-text { font-size: 1.15rem; color: #fff; line-height: 1.5; font-weight: 600; margin-bottom: 20px;}
        .vocab-ex-text { font-size: 1.05rem; color: var(--text-dim); font-style: italic; line-height: 1.5; margin: 0;}
        
        .vocab-speak-box {
            margin-top: auto; 
            background: linear-gradient(135deg, #1DB954 0%, #116a30 100%);
            border-radius: 12px; padding: 25px; color: #000;
            position: relative;
        }
        .vocab-speak-box::before {
            content: 'FOLLOW UP';
            position: absolute; top: -10px; left: 20px;
            background: #000; color: var(--accent);
            font-size: 0.7rem; font-weight: 800;
            padding: 4px 10px; border-radius: 500px;
            letter-spacing: 1px;
        }
        .vocab-speak-box p { color: #000; font-weight: 800; margin: 0; font-size: 1.15rem; line-height: 1.4; }

        /* Whiteboard Panel */
        .whiteboard-panel { position: fixed; bottom: 90px; right: 20px; width: 400px; height: 500px; background: #181818; border: 1px solid #282828; border-radius: 12px 12px 0 0; z-index: 101; transform: translateY(120%); display: flex; flex-direction: column; transition: 0.4s cubic-bezier(0.3, 0, 0, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.5);}
        .whiteboard-panel.open { transform: translateY(0); }
        .wb-header { padding: 18px 20px; border-bottom: 1px solid #282828; display: flex; justify-content: space-between; font-weight: 700; color: #fff;}
        .wb-content { flex: 1; padding: 20px; outline: none; color: var(--accent); font-family: monospace; font-size: 1.1rem; resize: none; border: none; background: transparent; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }

        .highlight-zone { padding: 25px; background: #181818; border-radius: 12px; margin-bottom: 20px; font-size: 1.2rem;}
        .hotspot { color: var(--accent); cursor: pointer; text-decoration: underline; font-weight: 700;}
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">WOLF LABS <span>|</span> CHILDHOOD MEMORIES</div>
        <div class="controls">
            <button class="icon-btn" onclick="toggleWhiteboard()" title="Live Whiteboard">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
            </button>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </header>

    <main id="main-container">
        <!-- STEPS INJECTED VIA JS -->
    </main>

    <nav class="nav-bar">
        <button class="btn" style="background: transparent; color: #fff; padding: 16px 0;" id="prevBtn" onclick="prevStep()" disabled>BACK</button>
        <div style="font-weight: 700; font-size: 0.9rem; color: var(--text-dim); letter-spacing: 2px;" id="step-counter">STEP 0 / 40</div>
        <button class="btn btn-accent" id="nextBtn" onclick="nextStep()">NEXT</button>
    </nav>

    <!-- PREMIUM VOCAB PANEL -->
    <aside class="vocab-panel" id="vocabPanel">
        <button class="vocab-close" onclick="closeVocab()">✕</button>
        
        <div>
            <p class="vocab-eyebrow">System Dictionary</p>
            <h2 id="vocab-title" class="vocab-title">WORD</h2>
        </div>

        <div class="vocab-card">
            <span class="vocab-card-label">Definition</span>
            <p id="vocab-def" class="vocab-def-text">Definition here.</p>
            
            <span class="vocab-card-label" style="margin-top: 25px;">Context Example</span>
            <p id="vocab-ex" class="vocab-ex-text">"Example sentence here."</p>
        </div>
        
        <div class="vocab-speak-box">
            <p id="vocab-speak">Follow up question here.</p>
        </div>
    </aside>

    <!-- WHITEBOARD -->
    <aside class="whiteboard-panel" id="whiteboardPanel">
        <div class="wb-header">
            <span>📝 Live Whiteboard</span>
            <button class="icon-btn" style="width: 24px; height: 24px; border: none; color: #fff;" onclick="toggleWhiteboard()">✕</button>
        </div>
        <textarea class="wb-content" placeholder="Teacher: Type live corrections or notes here..."></textarea>
    </aside>

    <script>
        // --- VOCABULARY DATA SYSTEM (A2 LEVEL) ---
        const vocabData = {
            'childhood': {
                def: 'The time of your life when you were a child.',
                ex: 'I had a very happy childhood playing in the street.',
                speak: 'Where did you live during your childhood?'
            },
            'memory': {
                def: 'Something that you remember from the past.',
                ex: 'My favorite memory is going to the beach with my family.',
                speak: 'What is your earliest memory?'
            },
            'bring back': {
                def: 'To make you remember something from the past.',
                ex: 'Listening to this song brings back memories of school.',
                speak: 'What song brings back good memories for you?'
            },
            'primary school': {
                def: 'A school for children aged 5 to 11.',
                ex: 'I met my best friend in primary school.',
                speak: 'Did you like your primary school? Why?'
            }
        };

        // --- DATA STRUCTURE FOR 40 STEPS (100% ENGLISH) ---
        const stepsData = [
            // 0
            `<div class="glass-panel">
                <h2>👨‍🏫 Teacher Guide (A2 Edition)</h2>
                <p>Welcome to the Wolf Labs Interactive Engine - A2 Edition.</p>
                <div style="border-left: 4px solid var(--accent); padding-left: 20px; margin: 20px 0;">
                    <p><strong>Topic:</strong> Childhood Memories & Nostalgia.</p>
                    <p><strong>Target:</strong> Past Simple and 'Used to'.</p>
                    <p><strong>Rule:</strong> 80% student speaking time. Never skip the 'SPEAKING HUB'.</p>
                    <p><strong>Features:</strong> 3-try error system, video transcript analysis, and debate generators.</p>
                </div>
                <button class="btn btn-accent" style="margin-top:10px;" onclick="this.style.display='none'; unlockPrompt('p0')">Initialize System</button>
                <div class="speaking-hub" id="p0"><p>Teacher, ask the student how they are feeling today before starting the engine.</p></div>
            </div>`,
            // 1
            `<div class="glass-panel" style="text-align: center; background: transparent;">
                <p style="color: var(--accent); font-weight: 800; letter-spacing: 2px;">LIFE & EXPERIENCES</p>
                <h1 style="font-size: 4rem; margin-top: 10px;">Childhood Memories</h1>
                <p style="font-size: 1.3rem;">Let's travel back in time and talk about the past.</p>
                <div style="background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; display: inline-block; margin: 30px 0;">
                    <p style="margin: 0; font-size: 0.8rem; color: var(--text-dim); letter-spacing: 1px;">GRAMMAR TARGET</p>
                    <h3 style="margin-top: 5px; font-size: 1.5rem;">Past Simple & "Used to"</h3>
                </div><br>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p1')">Enter the Time Machine</button>
                <div class="speaking-hub" id="p1" style="text-align: left;"><p>Read the title out loud. When you were a child, were you quiet or very energetic?</p></div>
            </div>`,
            // 2
            `<div class="glass-panel">
                <h2>System Calibration: Your Past</h2>
                <p>Adjust the sliders (1 = Never, 10 = A lot) to show how you were as a child.</p>
                <div class="slider-group"><label>1. I played outside on the street.</label><input type="range" min="1" max="10" value="5" onchange="checkSliders('p2')"></div>
                <div class="slider-group"><label>2. I watched a lot of cartoons on TV.</label><input type="range" min="1" max="10" value="5" onchange="checkSliders('p2')"></div>
                <div class="slider-group"><label>3. I liked going to school.</label><input type="range" min="1" max="10" value="5" onchange="checkSliders('p2')"></div>
                <div class="speaking-hub" id="p2"><p>Explain your numbers. What was your favorite cartoon or game?</p></div>
            </div>`,
            // 3
            `<div>
                <h2>Critical Scenario</h2>
                <p>Imagine you find a box of your old toys. What is your first reaction?</p>
                <div class="choice-grid">
                    <div class="choice-card" onclick="selectCard(this, '.choice-grid'); unlockPrompt('p3')"><h3>😁 Smile</h3><p style="font-size: 1rem; margin:0;">I feel happy and remember good times.</p></div>
                    <div class="choice-card" onclick="selectCard(this, '.choice-grid'); unlockPrompt('p3')"><h3>😢 Nostalgic</h3><p style="font-size: 1rem; margin:0;">I feel a bit sad because time passes too fast.</p></div>
                </div>
                <div class="speaking-hub" id="p3"><p>Do you still have any toys or objects from when you were a baby?</p></div>
            </div>`,
            // 4
            `<div class="glass-panel">
                <h2>Data Decryption: Key Concepts</h2>
                <p>Click the highlighted words to unlock definitions in the System Dictionary.</p>
                <div class="highlight-zone">
                    We all have strong <span class="vocab-word" onclick="openVocab('memory', 'p4')">memory</span> flashes from our <span class="vocab-word" onclick="openVocab('childhood', 'p4')">childhood</span>. 
                    Sometimes, an old photo or song can <span class="vocab-word" onclick="openVocab('bring back', 'p4')">bring back</span> the exact feeling we had in <span class="vocab-word" onclick="openVocab('primary school', 'p4')">primary school</span>.
                </div>
                <div class="speaking-hub" id="p4"><p>Use the word "childhood" in a sentence about yourself.</p></div>
            </div>`,
            // 5
            `<div>
                <h2>Vocab Match Protocol</h2>
                <p>Click the word, then click its correct meaning to connect them.</p>
                <div class="choice-grid" id="match-grid">
                    <div class="choice-card" data-val="1" onclick="handleMatch(this, 'p5')">Childhood</div>
                    <div class="choice-card" data-val="2" onclick="handleMatch(this, 'p5')">School for ages 5-11</div>
                    <div class="choice-card" data-val="3" onclick="handleMatch(this, 'p5')">Bring back</div>
                    <div class="choice-card" data-val="1" onclick="handleMatch(this, 'p5')">Time when you were a kid</div>
                    <div class="choice-card" data-val="2" onclick="handleMatch(this, 'p5')">Primary school</div>
                    <div class="choice-card" data-val="3" onclick="handleMatch(this, 'p5')">Make you remember</div>
                </div>
                <div class="speaking-hub" id="p5"><p>Teacher, check pronunciation for "childhood" and "memories".</p></div>
            </div>`,
            // 6 
            `<div class="glass-panel" style="text-align:center;">
                <h2>Pre-Flight Check</h2>
                <p>Before we watch the video, let's think about life before modern technology.</p>
                <div class="highlight-zone" style="font-size: 1.5rem; font-weight: 700;">
                    How did you talk to your friends when you were 10 years old?
                </div>
                <button class="btn btn-accent" onclick="this.style.display='none'; unlockPrompt('p6')">Reveal Hub</button>
                <div class="speaking-hub" id="p6" style="text-align:left;"><p>Did you use a home telephone, knock on their door, or use the internet?</p></div>
            </div>`,
            // 7

        let currentStep = 0;

        // Inject Steps into DOM
        function initializeSteps() {
            stepsData.forEach((htmlContent, index) => {
                const section = document.createElement('section');
                section.className = 'step';
                section.id = `step-${index}`;
                section.innerHTML = htmlContent;
                mainContainer.appendChild(section);
            });
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.step').forEach((step, index) => {
                if(index === currentStep) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            });

            document.getElementById('prevBtn').disabled = currentStep === 0;
            document.getElementById('nextBtn').style.display = currentStep === totalSteps - 1 ? 'none' : 'block';
            document.getElementById('step-counter').innerText = `STEP ${currentStep} / ${totalSteps - 1}`;
            
            const progress = (currentStep / (totalSteps - 1)) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            
            mainContainer.scrollTo(0, 0);
        }

        function nextStep() {
            if (currentStep < totalSteps - 1) { currentStep++; updateUI(); closeVocab(); }
        }

        function prevStep() {
            if (currentStep > 0) { currentStep--; updateUI(); closeVocab(); }
        }

                if (attempts >= maxAttempts) {
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        correctBtn.style.borderColor = 'var(--correct)';
                    }
                    if (promptIdToUnlock) {
                        setTimeout(() => unlockPrompt(promptIdToUnlock), 500);
                    }
                }
            }
        }

        function checkTrueFalse(btn, isCorrect, promptId) {
            const parent = btn.parentElement;
            let attempts = parseInt(parent.dataset.attempts || '0');
            const options = Array.from(parent.querySelectorAll('button'));
            
            if (isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.borderColor = 'var(--correct)';
                unlockPrompt(promptId);
            } else {
                attempts++;
                parent.dataset.attempts = attempts;
                
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.style.borderColor = 'var(--incorrect)';
                btn.style.animation = 'shake 0.4s';
                btn.style.pointerEvents = 'none';
                
                if (attempts >= 1) {
                    options.forEach(b => {
                        b.style.pointerEvents = 'none';
                        if (b.getAttribute('onclick').includes('true')) {
                            b.style.backgroundColor = 'var(--correct)';
                            b.style.color = '#000';
                            b.style.borderColor = 'var(--correct)';
                        }
                    });
                    setTimeout(() => unlockPrompt(promptId), 500);
                }
            }
        }

        // Memory Game
        const memSequence = ['PLAY', 'FRIENDS', 'GAMES', 'OUTSIDE'];
        let memIndex = 0;
        let memAttempts = 0;

        function startMemoryGame() {
            document.getElementById('mem-seq').style.display = 'none';
            document.getElementById('mem-start').style.display = 'none';
            document.getElementById('mem-test').style.display = 'block';
            memIndex = 0;
            memAttempts = 0;
        }

        function checkMem(btn, word, promptId) {
            if(word === memSequence[memIndex]) {
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                btn.style.pointerEvents = 'none';
                memIndex++;
                memAttempts = 0;
                if(memIndex === memSequence.length) unlockPrompt(promptId);
            } else {
                memAttempts++;
                btn.style.backgroundColor = 'var(--incorrect)';
                setTimeout(()=> {
                    if(btn.style.backgroundColor !== 'var(--correct)') {
                        btn.style.backgroundColor = '#282828';
                    }
                }, 500);

                if (memAttempts >= 3) {
                    const correctWord = memSequence[memIndex];
                    const parent = btn.parentElement;
                    const correctBtn = Array.from(parent.querySelectorAll('.memory-btn')).find(b => b.innerText.trim() === correctWord);
                    
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        correctBtn.style.pointerEvents = 'none';
                    }
                    memIndex++;
                    memAttempts = 0;
                    if(memIndex === memSequence.length) {
                        setTimeout(() => unlockPrompt(promptId), 500);
                    }
                }
            }
        }

        // Builders
        let buildState = {};
        function moveWord(chip, dzId, targetArray, promptId) {
            if(chip.classList.contains('used')) return;
            const word = chip.innerText;
            const dz = document.getElementById(dzId);
            
            const newChip = document.createElement('div');
            newChip.className = 'word-chip';
            newChip.style.background = 'var(--accent)';
            newChip.style.color = '#000';
            newChip.innerText = word;
            dz.appendChild(newChip);
            chip.classList.add('used');

            if(!buildState[dzId]) buildState[dzId] = [];
            buildState[dzId].push(word);

            if(buildState[dzId].length === targetArray.length) {
                if(JSON.stringify(buildState[dzId]) === JSON.stringify(targetArray)) {
                    dz.classList.add('success');
                    unlockPrompt(promptId);
                } else {
                    let attempts = parseInt(dz.dataset.attempts || '0') + 1;
                    dz.dataset.attempts = attempts;
                    
                    dz.style.borderColor = 'var(--incorrect)'; dz.style.animation = 'shake 0.4s';
                    
                    if (attempts >= 3) {
                        setTimeout(() => {
                            dz.innerHTML = '';
                            dz.style.borderColor = '';
                            dz.style.animation = '';
                            dz.classList.add('success');
                            
                            targetArray.forEach(w => {
                                const finalChip = document.createElement('div');
                                finalChip.className = 'word-chip';
                                finalChip.style.background = 'var(--accent)';
                                finalChip.style.color = '#000';
                                finalChip.innerText = w;
                                dz.appendChild(finalChip);
                            });
                            
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c => c.classList.add('used'));
                            setTimeout(() => unlockPrompt(promptId), 500);
                        }, 1000);
                    } else {
                        setTimeout(() => { 
                            dz.innerHTML = ''; dz.style.borderColor=''; dz.style.animation=''; buildState[dzId]=[]; 
                            chip.parentElement.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('used')); 
                        }, 1000);
                    }
                }
            }
        }

        // Chat Logic
        function handleChat(btn, isCorrect, containerId, promptId) {
            const container = document.getElementById(containerId);
            let attempts = parseInt(container.dataset.attempts || '0');
            const options = Array.from(container.querySelectorAll('.chat-option'));
            const maxAttempts = Math.min(3, options.length - 1);

            if(isCorrect) {
                options.forEach(b => b.style.pointerEvents = 'none');
                btn.style.backgroundColor = 'var(--correct)';
                btn.style.color = '#000';
                setTimeout(() => {
                    container.innerHTML = `<div class="msg you" style="display:block;">${btn.innerText}</div>`;
                    unlockPrompt(promptId);
                }, 800);
            } else {
                attempts++;
                container.dataset.attempts = attempts;
                
                btn.style.backgroundColor = 'var(--incorrect)';
                btn.style.color = '#fff';
                btn.style.animation = 'shake 0.4s';
                btn.style.pointerEvents = 'none';

                if (attempts >= maxAttempts) {
                    const correctBtn = options.find(b => b.getAttribute('onclick').includes('true'));
                    options.forEach(b => b.style.pointerEvents = 'none');
                    if (correctBtn) {
                        correctBtn.style.backgroundColor = 'var(--correct)';
                        correctBtn.style.color = '#000';
                        setTimeout(() => {
                            container.innerHTML = `<div class="msg you" style="display:block;">${correctBtn.innerText}</div>`;
                            unlockPrompt(promptId);
                        }, 1000);
                    }
                }
            }
        }

        // Card Flip
        function flipCard(card, promptId) {
            if(!card.classList.contains('flipped')) {
                card.classList.add('flipped');
                unlockPrompt(promptId);
            }
        }

        // Match Game
        let matchSelected = null;
        let matchesFound = 0;
        function handleMatch(card, promptId) {
            if(card.style.opacity === '0') return;
            if(!matchSelected) {
                matchSelected = card;
                card.style.borderColor = 'var(--accent)';
            } else {
                if(matchSelected.dataset.val === card.dataset.val && matchSelected !== card) {
                    matchSelected.style.opacity = '0'; card.style.opacity = '0';
                    matchesFound++;
                    if(matchesFound === 3) unlockPrompt(promptId);
                } else {
                    matchSelected.style.borderColor = 'transparent';
                    card.style.animation = 'shake 0.4s';
                }
                matchSelected = null;
            }
        }

        // Roleplay generator
        const roles = [
            "A Grandparent explaining life without internet.",
            "An adult who misses 90s cartoons.",
            "A teenager asking what an 'audio tape' is."
        ];
        function generateRole(promptId) {
            document.getElementById('role-box').innerText = roles[Math.floor(Math.random() * roles.length)];
            unlockPrompt(promptId);
        }

        // UI Tools (Whiteboard & Vocab)
        function toggleWhiteboard() { document.getElementById('whiteboardPanel').classList.toggle('open'); }
        
        function openVocab(word, promptId) {
            const data = vocabData[word];
            if(data) {
                document.getElementById('vocab-title').innerText = word;
                document.getElementById('vocab-def').innerText = data.def;
                document.getElementById('vocab-ex').innerText = `"${data.ex}"`;
                document.getElementById('vocab-speak').innerText = data.speak;
            }
            document.getElementById('vocabPanel').classList.add('open');
            unlockPrompt(promptId);
        }
        
        function closeVocab() { document.getElementById('vocabPanel').classList.remove('open'); }
        
        function toggleFullscreen() {
            try {
                if (!document.fullscreenEnabled) {
                    console.warn("O modo tela cheia não é permitido neste ambiente.");
                    return;
                }
                if (!document.fullscreenElement) {
                    const promise = document.documentElement.requestFullscreen();
                    if (promise !== undefined) {
                        promise.catch(err => {
                            console.warn(`Erro ao tentar ativar tela cheia: ${err.message}`);
                        });
                    }
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            } catch (err) {
                console.warn(`Erro inesperado ao alternar tela cheia: ${err.message}`);
            }
        }

        // Start
        window.onload = initializeSteps;
    </script>
</body>
</html>
